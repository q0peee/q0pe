<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>q0pe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@700&family=Nunito:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:white;
font-family:'Nunito',sans-serif;
}

/* TOP BAR */

.topbar{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
border-bottom:1px solid #eee;
}

/* LEFT */

.left{
display:flex;
align-items:center;
gap:20px;
}

/* LOGO */

.logo{
font-family:'Geologica',sans-serif;
font-size:26px;
}

/* FRIENDS BUTTON */

.friends{
cursor:pointer;
position:relative;
}

/* SEARCH */

.center{
flex:1;
display:flex;
justify-content:center;
}

.search input{
width:300px;
padding:9px 15px;
border-radius:20px;
border:1px solid #ddd;
outline:none;
}

/* RIGHT */

.right{
display:flex;
align-items:center;
gap:25px;
}

/* TEXT BUTTON */

.button{
cursor:pointer;
}

/* SETTINGS */

.settings{
cursor:pointer;
position:relative;
}

/* DROPDOWN */

.dropdown{
position:absolute;
top:40px;
left:0;
background:white;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
padding:8px;
width:180px;
display:none;
flex-direction:column;
}

.dropdown div{
padding:8px;
border-radius:8px;
cursor:pointer;
}

.dropdown div:hover{
background:#f3f3f3;
}

/* ADD FRIEND INPUT */

.addFriend{
display:none;
margin-top:10px;
}

.addFriend input{
width:100%;
padding:8px;
border-radius:10px;
border:1px solid #ddd;
outline:none;
}

</style>
</head>

<body>

<div class="topbar">

<div class="left">

<div class="logo">q0pe</div>

<div class="friends" id="friendsBtn">

Znajomi

<div class="dropdown" id="friendsMenu">

<div>Moi znajomi</div>

<div id="addFriendBtn">Dodaj znajomego</div>

<div class="addFriend" id="addFriendBox">
<input placeholder="Wpisz nazwę użytkownika">
</div>

</div>

</div>

</div>

<div class="center">
<div class="search">
<input placeholder="Szukaj użytkowników...">
</div>
</div>

<div class="right">

<div class="button">Powiadomienia</div>

<div class="settings" id="settingsBtn">

⚙

<div class="dropdown" id="settingsMenu">

<div>Opcja 1</div>
<div>Opcja 2</div>
<div>Opcja 3</div>
<div id="logoutBtn">Wyloguj</div>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBlUC0MjnkhcBbWeeSV2m1qA0FUthXNOCw",
authDomain: "q0peee.firebaseapp.com",
projectId: "q0peee",
appId: "1:172139799914:web:ffc02c6c3b49a3fb57b113"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN CHECK */

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="index.html";
}
});

/* SETTINGS MENU */

const settingsBtn=document.getElementById("settingsBtn");
const settingsMenu=document.getElementById("settingsMenu");

settingsBtn.onclick=()=>{

settingsMenu.style.display =
settingsMenu.style.display==="flex" ? "none" : "flex";

};

/* FRIENDS MENU */

const friendsBtn=document.getElementById("friendsBtn");
const friendsMenu=document.getElementById("friendsMenu");

friendsBtn.onclick=()=>{

friendsMenu.style.display =
friendsMenu.style.display==="flex" ? "none" : "flex";

};

/* ADD FRIEND */

const addBtn=document.getElementById("addFriendBtn");
const addBox=document.getElementById("addFriendBox");

addBtn.onclick=()=>{

addBox.style.display =
addBox.style.display==="block" ? "none" : "block";

};

/* LOGOUT */

document.getElementById("logoutBtn").onclick=async()=>{

await signOut(auth);
window.location.href="index.html";

};

</script>

</body>
</html>
