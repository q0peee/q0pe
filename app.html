<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>q0pe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@700&family=Nunito:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:white;
font-family:'Nunito',sans-serif;
}

/* TOP BAR */

.topbar{
height:60px;
display:flex;
align-items:center;
gap:25px;
padding:0 25px;
border-bottom:1px solid #eee;
}

/* LOGO */

.logo{
font-family:'Geologica',sans-serif;
font-size:26px;
}

/* LINK */

.link{
cursor:pointer;
font-weight:600;
}

/* SEARCH */

.search{
flex:1;
}

.search input{
width:100%;
max-width:300px;
padding:8px 14px;
border-radius:20px;
border:1px solid #ddd;
outline:none;
}

/* ICONS */

.icon{
cursor:pointer;
font-size:18px;
}

/* SETTINGS */

.settings{
position:relative;
cursor:pointer;
}

/* DROPDOWN */

.dropdown{
position:absolute;
top:40px;
right:0;
background:white;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
padding:8px;
width:150px;
display:none;
flex-direction:column;
}

.dropdown div{
padding:8px;
border-radius:8px;
cursor:pointer;
}

.dropdown div:hover{
background:#f3f3f3;
}

</style>
</head>

<body>

<div class="topbar">

<div class="logo">q0pe</div>

<div class="link">Znajomi</div>

<div class="search">
<input placeholder="Szukaj użytkowników...">
</div>

<div class="icon">🔔</div>

<button>1</button>

<div class="settings" id="settingsBtn">
⚙

<div class="dropdown" id="settingsMenu">

<div>Opcja 1</div>
<div>Opcja 2</div>
<div>Opcja 3</div>
<div id="logoutBtn">Wyloguj</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBlUC0MjnkhcBbWeeSV2m1qA0FUthXNOCw",
authDomain: "q0peee.firebaseapp.com",
projectId: "q0peee",
appId: "1:172139799914:web:ffc02c6c3b49a3fb57b113"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* SPRAWDZANIE LOGINU */

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="index.html";
}

});

/* DROPDOWN SETTINGS */

const btn=document.getElementById("settingsBtn");
const menu=document.getElementById("settingsMenu");

btn.onclick=()=>{

menu.style.display =
menu.style.display==="flex" ? "none" : "flex";

};

/* WYLOGUJ */

document.getElementById("logoutBtn").onclick=async()=>{

await signOut(auth);
window.location.href="index.html";

};

</script>

</body>
</html>
