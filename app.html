<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>q0pe – app</title>
</head>
<body>
  <h1>Witaj w aplikacji 🎉</h1>
  <button id="logout">Wyloguj</button>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlUC0MjnkhcBbWeeSV2m1qA0FUthXNOCw",
  authDomain: "q0peee.firebaseapp.com",
  projectId: "q0peee",
  appId: "1:172139799914:web:ffc02c6c3b49a3fb57b113"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let checked = false;

onAuthStateChanged(auth, async (user) => {

  if (checked) return;
  checked = true;

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));
  const data = snap.data();

  if (data) {
    const welcome = document.getElementById("welcome");
    if (welcome) {
      welcome.textContent = "Witaj, " + data.displayName + " 👋";
    }

    const avatar = document.getElementById("userAvatar");
    if (avatar) {
      avatar.src = data.photoURL || user.photoURL;
    }
  }

});

document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  window.location.href = "index.html";
};
</script>
</body>
</html>
