<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>q0pe – login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@700&family=Nunito:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#fff,#656466);
font-family:'Nunito',sans-serif;
}

.center{
text-align:center;
}

.logo{
font-family:'Geologica',sans-serif;
font-size:64px;
margin-bottom:40px;
}

.input{
display:block;
width:260px;
margin:10px auto;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
font-size:15px;
}

button{
padding:14px 24px;
font-size:16px;
font-weight:700;
border-radius:12px;
border:none;
cursor:pointer;
background:#00d440;
margin-top:10px;
}

.google{
background:#ffffff;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="center">

<div class="logo">q0pe</div>

<input id="email" class="input" placeholder="Email">
<input id="password" class="input" type="password" placeholder="Hasło">

<button id="loginEmailBtn">Zaloguj się</button>

<div style="margin:20px 0;">lub</div>

<button class="google" id="loginGoogleBtn">
Zaloguj przez Google
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
signInWithPopup,
GoogleAuthProvider,
onAuthStateChanged,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBlUC0MjnkhcBbWeeSV2m1qA0FUthXNOCw",
authDomain: "q0peee.firebaseapp.com",
projectId: "q0peee",
appId: "1:172139799914:web:ffc02c6c3b49a3fb57b113"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

/* GOOGLE LOGIN */

document.getElementById("loginGoogleBtn").onclick = () => {

signInWithPopup(auth, provider);

};

/* EMAIL LOGIN */

document.getElementById("loginEmailBtn").onclick = async () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

}catch(e){

alert("Błąd logowania: "+e.message);

}

};

/* SPRAWDZANIE KONTA */

onAuthStateChanged(auth, async user => {

if(!user) return;

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(snap.exists()){

window.location.href="app.html";

}else{

window.location.href="signup.html";

}

});

</script>

</body>
</html>
